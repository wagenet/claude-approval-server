<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Approval Queue</title>
    <link rel="stylesheet" href="./ui.css" />
    <script type="module" src="./ui.ts"></script>
  </head>
  <body>
    <div id="notif-banner"></div>
    <div id="plan-modal">
      <div id="plan-modal-inner">
        <div id="plan-modal-header">
          <span class="badge badge-plan">ExitPlanMode</span>
          <span id="plan-modal-title"></span>
        </div>
        <div id="plan-modal-body"></div>
        <div id="plan-modal-footer">
          <button class="btn-approve-plan" id="plan-modal-approve">Approve Plan</button>
          <button class="btn-deny" id="plan-modal-deny">Deny</button>
          <button class="btn-focus hidden" id="plan-modal-focus">Focus</button>
          <button class="btn-dismiss" id="plan-modal-close">Close</button>
        </div>
      </div>
    </div>

    <div id="settings-modal">
      <div id="settings-inner">
        <div id="settings-header">
          <span>Settings</span>
          <button class="btn-dismiss" id="settings-close">✕</button>
        </div>
        <div id="settings-body">
          <label
            >Theme
            <select id="setting-theme">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </label>
          <label class="settings-label-inline">
            <input type="checkbox" id="setting-notif-enabled" />
            Enable browser notifications
          </label>
          <label class="settings-label-inline">
            <input type="checkbox" id="setting-require-interaction" />
            Keep approval notifications until dismissed
            <small class="settings-note">Not supported on macOS</small>
          </label>
        </div>
        <div id="settings-footer">
          <button class="btn-allow" id="settings-save">Save</button>
        </div>
      </div>
    </div>

    <div id="top-bar">
      <button id="settings-btn" title="Settings">⚙</button>
    </div>

    <div class="columns">
      <div class="column">
        <h1><span class="dot"></span> Approval Queue</h1>
        <div id="idle">No pending requests</div>
        <div id="queue"></div>
      </div>
      <div class="column">
        <h1><span class="dot dot-idle"></span> Idle Sessions</h1>
        <div id="idle-empty">No idle sessions</div>
        <div id="idle-list"></div>
      </div>
    </div>
  </body>
</html>
