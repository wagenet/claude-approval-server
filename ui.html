<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Approval Queue</title>
    <script type="module" src="./ui.ts"></script>
    <style>
      :root {
        --bg: #0f1117;
        --card-bg: #1e2330;
        --border: #2d3548;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --text-dim: #475569;
        --text-timer: #64748b;
      }
      [data-theme="light"] {
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --border: #e2e8f0;
        --text: #0f172a;
        --text-muted: #475569;
        --text-dim: #94a3b8;
        --text-timer: #64748b;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 1rem;
      }

      @media (min-width: 640px) {
        body {
          padding: 2rem;
        }
      }

      h1 {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      h1 .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      #idle {
        text-align: center;
        color: var(--text-dim);
        padding: 4rem 0;
        font-size: 0.95rem;
      }

      #top-bar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 1rem;
      }

      #settings-btn {
        background: transparent;
        color: var(--text-timer);
        border: 1px solid var(--border);
        padding: 0.5rem 0.9rem;
        font-size: 1.4rem;
      }
      #settings-btn:hover {
        color: var(--text-muted);
        border-color: var(--text-dim);
      }

      .columns {
        display: flex;
        flex-direction: column;
        gap: 2rem;
        align-items: flex-start;
      }

      @media (min-width: 900px) {
        .columns {
          flex-direction: row;
        }
      }

      .column {
        width: 100%;
        min-width: 0;
        max-width: 720px;
      }

      @media (min-width: 900px) {
        .column {
          flex: 1;
          width: auto;
        }
      }

      #queue {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      #idle-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1.25rem;
        animation: slideIn 0.15s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .badge {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 0.2em 0.55em;
        border-radius: 4px;
        text-transform: uppercase;
      }

      .badge-bash {
        background: #7c3aed22;
        color: #a78bfa;
        border: 1px solid #7c3aed44;
      }
      .badge-write {
        background: #dc262622;
        color: #f87171;
        border: 1px solid #dc262644;
      }
      .badge-edit {
        background: #d9770622;
        color: #fb923c;
        border: 1px solid #d9770644;
      }
      .badge-default {
        background: #0ea5e922;
        color: #38bdf8;
        border: 1px solid #0ea5e944;
      }
      .badge-mcp {
        background: #0d946622;
        color: #34d399;
        border: 1px solid #0d946644;
      }
      .badge-plan {
        background: #d9770622;
        color: #fb923c;
        border: 1px solid #d9770644;
      }
      .card-plan {
        border-left: 3px solid #d97706;
      }

      #plan-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 100;
        padding: 2rem;
        overflow-y: auto;
      }
      #plan-modal.open {
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }

      #plan-modal-inner {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        width: 100%;
        max-width: 860px;
        display: flex;
        flex-direction: column;
      }

      #plan-modal-header {
        padding: 1.25rem 1.5rem 0.75rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      #plan-modal-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
        flex: 1;
      }

      #plan-modal-body {
        padding: 1.25rem 1.5rem;
        font-size: 0.875rem;
        color: var(--text);
        line-height: 1.6;
        max-height: calc(100vh - 12rem);
        overflow-y: auto;
      }

      #plan-modal-body h1,
      #plan-modal-body h2,
      #plan-modal-body h3 {
        color: var(--text);
        font-weight: 600;
        margin: 1.25rem 0 0.5rem;
      }
      #plan-modal-body h1 {
        font-size: 1.1rem;
      }
      #plan-modal-body h2 {
        font-size: 0.95rem;
      }
      #plan-modal-body h3 {
        font-size: 0.875rem;
        color: var(--text-muted);
      }
      #plan-modal-body p {
        margin-bottom: 0.75rem;
        line-height: 1.6;
      }
      #plan-modal-body ul,
      #plan-modal-body ol {
        margin: 0.5rem 0 0.75rem 1.25rem;
        line-height: 1.6;
      }
      #plan-modal-body li {
        margin-bottom: 0.25rem;
      }
      #plan-modal-body code {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.8em;
        background: var(--bg);
        padding: 0.1em 0.35em;
        border-radius: 3px;
        color: #fb923c;
      }
      #plan-modal-body pre {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.75rem 1rem;
        margin-bottom: 0.75rem;
        overflow-x: auto;
        max-height: none;
      }
      #plan-modal-body pre code {
        background: none;
        padding: 0;
        color: var(--text);
      }
      #plan-modal-body hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1rem 0;
      }
      #plan-modal-body strong {
        color: var(--text);
      }

      #plan-modal-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 0.625rem;
      }

      .btn-approve-plan {
        background: #16a34a;
        color: #fff;
      }
      .btn-approve-plan:hover {
        background: #15803d;
      }
      .btn-approve-plan:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .session {
        font-size: 0.72rem;
        color: var(--text-dim);
        font-family: monospace;
        margin-left: auto;
      }

      .timer {
        font-size: 0.72rem;
        color: var(--text-timer);
      }

      .cwd {
        font-size: 0.72rem;
        color: var(--text-dim);
        font-family: monospace;
      }

      pre {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.75rem 1rem !important;
        font-size: 0.8rem;
        font-family: "SF Mono", "Fira Code", monospace;
        overflow-x: auto;
        white-space: pre;
        overflow-x: auto;
        margin-bottom: 1rem;
        max-height: 200px;
        overflow-y: auto;
      }

      .file-path {
        font-size: 0.72rem;
        font-family: "SF Mono", "Fira Code", monospace;
        color: var(--text-timer);
        margin-bottom: 0.25rem;
      }

      .two-part-block pre {
        margin-bottom: 0.5rem;
      }
      .two-part-block pre:last-child {
        margin-bottom: 0;
      }

      .diff-block {
        word-break: normal;
      }
      .diff-added,
      .diff-removed,
      .diff-context {
        display: block;
        padding: 0 0.25rem;
      }
      .diff-added {
        background: rgba(22, 163, 74, 0.18);
        color: #86efac;
      }
      .diff-removed {
        background: rgba(220, 38, 38, 0.18);
        color: #fca5a5;
      }

      .actions {
        display: flex;
        gap: 0.625rem;
      }

      button {
        display: inline-flex;
        align-items: center;
        gap: 0.35em;
        padding: 0.45rem 1.2rem;
        border-radius: 6px;
        border: none;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.1s,
          transform 0.1s;
      }

      button:active {
        transform: scale(0.97);
      }

      .btn-allow {
        background: #16a34a;
        color: #fff;
      }
      .btn-allow:hover {
        background: #15803d;
      }

      .btn-deny {
        background: #374151;
        color: #d1d5db;
      }
      .btn-deny:hover {
        background: #4b5563;
      }

      .btn-allow:disabled,
      .btn-deny:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn-explain {
        background: transparent;
        color: var(--text-timer);
        border: 1px solid var(--border);
      }
      .btn-explain:hover {
        color: var(--text-muted);
        border-color: var(--text-dim);
      }
      .btn-explain:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn-focus {
        background: transparent;
        color: var(--text-timer);
        border: 1px solid var(--border);
      }
      .btn-focus:hover {
        color: var(--text-muted);
        border-color: var(--text-dim);
      }

      .dot-idle {
        background: var(--text-timer);
        animation: none;
      }
      .badge-idle {
        background: var(--card-bg);
        color: var(--text-timer);
        border: 1px solid var(--border);
      }
      .idle-time {
        font-size: 0.75rem;
        color: var(--text-dim);
        margin-bottom: 0.5rem;
        font-family: monospace;
      }

      .idle-output {
        display: none;
        font-size: 0.8rem;
        color: var(--text-muted);
        line-height: 1.55;
        word-break: break-word;
        max-height: 200px;
        overflow-y: auto;
        border-left: 2px solid var(--border);
        padding: 0.4rem 0.75rem;
        margin-bottom: 0.75rem;
      }
      .idle-output p {
        margin-bottom: 0.4rem;
      }
      .idle-output p:last-child {
        margin-bottom: 0;
      }
      .idle-output ul,
      .idle-output ol {
        margin: 0.25rem 0 0.4rem 1.1rem;
      }
      .idle-output code {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.8em;
        background: var(--bg);
        padding: 0.1em 0.3em;
        border-radius: 3px;
      }
      .btn-dismiss {
        background: transparent;
        color: var(--text-timer);
        border: 1px solid var(--border);
      }
      .btn-dismiss:hover {
        color: var(--text-muted);
        border-color: var(--text-dim);
      }

      #idle-empty {
        text-align: center;
        color: var(--text-dim);
        padding: 4rem 0;
        font-size: 0.95rem;
      }

      .badge-question {
        background: #0d947422;
        color: #34d399;
        border: 1px solid #0d947444;
      }

      .ask-body {
        margin-bottom: 1rem;
      }

      .ask-section + .ask-section {
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
      }

      .ask-section-header {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-timer);
        margin-bottom: 0.3rem;
      }

      .ask-section-question {
        font-size: 0.9rem;
        color: var(--text);
        margin-bottom: 0.6rem;
        line-height: 1.4;
      }

      .ask-option {
        display: flex;
        flex-direction: column;
        padding: 0.3rem 0;
      }

      .ask-option-label {
        font-size: 0.82rem;
        color: var(--text-muted);
        font-weight: 500;
      }

      .ask-option-desc {
        font-size: 0.75rem;
        color: var(--text-dim);
        line-height: 1.4;
      }

      #notif-banner {
        font-size: 0.8rem;
        color: var(--text-muted);
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.5rem 0.875rem;
        margin-bottom: 1.25rem;
      }
      #notif-banner a {
        color: #38bdf8;
      }
      #notif-banner code {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.85em;
      }

      .explanation {
        font-size: 0.82rem;
        color: var(--text-muted);
        line-height: 1.55;
        border-left: 2px solid var(--border);
        padding: 0.4rem 0.75rem;
        margin-bottom: 1rem;
      }

      /* Settings modal */
      #settings-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 100;
        padding: 2rem;
        overflow-y: auto;
        align-items: flex-start;
        justify-content: center;
      }
      #settings-modal.open {
        display: flex;
      }

      #settings-inner {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
      }

      #settings-header {
        padding: 1.25rem 1.5rem 0.75rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      #settings-header span {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
        flex: 1;
      }

      #settings-close {
        padding: 0.2rem 0.5rem;
        font-size: 0.9rem;
        line-height: 1;
      }

      #settings-body {
        padding: 1.25rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      #settings-body label {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      #settings-body input[type="number"],
      #settings-body select {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.4rem 0.6rem;
        font-size: 0.85rem;
        width: 100%;
      }

      .settings-label-inline {
        flex-direction: row !important;
        align-items: center !important;
      }

      #settings-body small {
        font-size: 0.75rem;
        color: var(--text-timer);
      }

      #settings-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
        gap: 0.625rem;
      }

      /* Light-mode syntax highlight overrides (github.min.css palette) */
      [data-theme="light"] .hljs {
        color: #24292e;
        background: #f6f8fa;
      }
      [data-theme="light"] .hljs-doctag,
      [data-theme="light"] .hljs-keyword,
      [data-theme="light"] .hljs-meta .hljs-keyword,
      [data-theme="light"] .hljs-template-tag,
      [data-theme="light"] .hljs-template-variable,
      [data-theme="light"] .hljs-type,
      [data-theme="light"] .hljs-variable.language_ {
        color: #d73a49;
      }
      [data-theme="light"] .hljs-title,
      [data-theme="light"] .hljs-title.class_,
      [data-theme="light"] .hljs-title.class_.inherited__,
      [data-theme="light"] .hljs-title.function_ {
        color: #6f42c1;
      }
      [data-theme="light"] .hljs-attr,
      [data-theme="light"] .hljs-attribute,
      [data-theme="light"] .hljs-literal,
      [data-theme="light"] .hljs-meta,
      [data-theme="light"] .hljs-number,
      [data-theme="light"] .hljs-operator,
      [data-theme="light"] .hljs-variable,
      [data-theme="light"] .hljs-selector-attr,
      [data-theme="light"] .hljs-selector-class,
      [data-theme="light"] .hljs-selector-id {
        color: #005cc5;
      }
      [data-theme="light"] .hljs-regexp,
      [data-theme="light"] .hljs-string,
      [data-theme="light"] .hljs-meta .hljs-string {
        color: #032f62;
      }
      [data-theme="light"] .hljs-built_in,
      [data-theme="light"] .hljs-symbol {
        color: #e36209;
      }
      [data-theme="light"] .hljs-comment,
      [data-theme="light"] .hljs-code,
      [data-theme="light"] .hljs-formula {
        color: #6a737d;
      }
      [data-theme="light"] .hljs-name,
      [data-theme="light"] .hljs-quote,
      [data-theme="light"] .hljs-selector-tag,
      [data-theme="light"] .hljs-selector-pseudo {
        color: #22863a;
      }
      [data-theme="light"] .hljs-subst {
        color: #24292e;
      }
      [data-theme="light"] .hljs-section {
        color: #005cc5;
        font-weight: bold;
      }
      [data-theme="light"] .hljs-bullet {
        color: #735c0f;
      }
      [data-theme="light"] .hljs-emphasis {
        color: #24292e;
        font-style: italic;
      }
      [data-theme="light"] .hljs-strong {
        color: #24292e;
        font-weight: bold;
      }
      [data-theme="light"] .hljs-addition {
        color: #22863a;
        background-color: #f0fff4;
      }
      [data-theme="light"] .hljs-deletion {
        color: #b31d28;
        background-color: #ffeef0;
      }
    </style>
  </head>
  <body>
    <div id="notif-banner" style="display: none"></div>
    <div id="plan-modal">
      <div id="plan-modal-inner">
        <div id="plan-modal-header">
          <span class="badge badge-plan">ExitPlanMode</span>
          <span id="plan-modal-title"></span>
        </div>
        <div id="plan-modal-body"></div>
        <div id="plan-modal-footer">
          <button class="btn-approve-plan" id="plan-modal-approve">Approve Plan</button>
          <button class="btn-deny" id="plan-modal-deny">Deny</button>
          <button class="btn-focus" id="plan-modal-focus" style="display: none">Focus</button>
          <button class="btn-dismiss" id="plan-modal-close" style="margin-left: auto">Close</button>
        </div>
      </div>
    </div>

    <div id="settings-modal">
      <div id="settings-inner">
        <div id="settings-header">
          <span>Settings</span>
          <button class="btn-dismiss" id="settings-close">✕</button>
        </div>
        <div id="settings-body">
          <label
            >Theme
            <select id="setting-theme">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </label>
          <label class="settings-label-inline">
            <input type="checkbox" id="setting-notif-enabled" />
            Enable browser notifications
          </label>
          <label class="settings-label-inline">
            <input type="checkbox" id="setting-require-interaction" />
            Keep approval notifications until dismissed
            <small style="display: block; opacity: 0.6; font-size: 0.8em; margin-top: 2px"
              >Not supported on macOS</small
            >
          </label>
        </div>
        <div id="settings-footer">
          <button class="btn-allow" id="settings-save">Save</button>
        </div>
      </div>
    </div>

    <div id="top-bar">
      <button id="settings-btn" title="Settings">⚙</button>
    </div>

    <div class="columns">
      <div class="column">
        <h1><span class="dot"></span> Approval Queue</h1>
        <div id="idle">No pending requests</div>
        <div id="queue" style="display: none"></div>
      </div>
      <div class="column">
        <h1><span class="dot dot-idle"></span> Idle Sessions</h1>
        <div id="idle-empty">No idle sessions</div>
        <div id="idle-list" style="display: none"></div>
      </div>
    </div>
  </body>
</html>
