name: Release Please
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: bun install
      - name: Build frontend
        run: |
          pnpm --dir frontend install
          pnpm --dir frontend build
          bun scripts/embed-frontend.ts
      - name: Build binaries
        run: |
          bun build --compile --minify --target=bun-darwin-arm64 src/cli.ts \
            --outfile dist/claude-approval-server-macos-arm64
          bun build --compile --minify --target=bun-darwin-x64 src/cli.ts \
            --outfile dist/claude-approval-server-macos-x86_64
      - name: Smoke test binary
        run: |
          ./dist/claude-approval-server-macos-arm64 serve &
          SERVER_PID=$!
          sleep 2
          curl -sf http://localhost:4759/queue
          kill $SERVER_PID
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/claude-approval-server-*
      - name: Update Homebrew formula
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          SHA_ARM=$(shasum -a 256 dist/claude-approval-server-macos-arm64 | awk '{print $1}')
          SHA_X64=$(shasum -a 256 dist/claude-approval-server-macos-x86_64 | awk '{print $1}')
          ruby Formula/update-formula.rb "$VERSION" "$SHA_ARM" "$SHA_X64"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: update homebrew formula to ${VERSION}"
          git push
